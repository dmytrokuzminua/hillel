<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>UserSystem</title>
    <style>
        /* Вбудовані стилі для автономної роботи */
        body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        .navbar { background: #2c3e50; color: white; padding: 1rem; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        /* Стилізація полів форми */
        form p { margin-bottom: 1rem; }
        input[type="text"], input[type="password"], input[type="email"] {
            width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        button {
            background: #3498db; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; cursor: pointer; font-size: 16px;
        }
        button:hover { background: #2980b9; }
        .alert { padding: 10px; background: #d4edda; color: #155724; border-radius: 4px; margin-bottom: 1rem; }
        ul.errorlist { color: #e74c3c; padding-left: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container" style="display: flex; justify-content: space-between; width: 100%;">
            <strong>UserSystem</strong>
            <div class="nav-links" style="display: flex; align-items: center;">
                {% if user.is_authenticated %}
                    <a href="{% url 'profile' user.username %}" style="color: white; margin-left: 15px; text-decoration: none;">Профіль</a>
                    <a href="{% url 'edit_profile' %}" style="color: white; margin-left: 15px; text-decoration: none;">Редагувати</a>

                    <!-- ИСПРАВЛЕННЫЙ ВЫХОД (ФОРМА ВМЕСТО ССЫЛКИ) -->
                    <form method="post" action="{% url 'logout' %}" style="display: inline; margin-left: 15px;">
                        {% csrf_token %}
                        <button type="submit" style="background: none; border: none; color: white; cursor: pointer; font-family: inherit; font-size: 16px; padding: 0; width: auto;">
                            Вийти
                        </button>
                    </form>

                {% else %}
                    <a href="{% url 'login' %}" style="color: white; margin-left: 15px; text-decoration: none;">Вхід</a>
                    <a href="{% url 'register' %}" style="color: white; margin-left: 15px; text-decoration: none;">Реєстрація</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <div class="card">
            {% block content %}
            {% endblock %}
        </div>
    </div>

</body>
</html>
